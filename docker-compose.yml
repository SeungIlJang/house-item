# 통합 실행용 Docker Compose (배포/전체 실행)
#
# 개발 중에는 로컬 PostgreSQL + uv/npm 을 직접 사용합니다.
# 이 파일은 배포 또는 "한 번에 전체 실행"이 필요할 때 사용합니다.
#
# 실행:
#   docker compose up --build
#   → 프론트:  http://localhost:8080
#   → 백엔드:  http://localhost:8000 (직접 접근 시)
#
# 주의: 로컬 5432 가 이미 쓰이면 DB_PORT 를 5433 등으로 바꾸세요.

services:
  db:
    image: postgres:16-alpine
    container_name: home-items-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-home_items}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-home_items_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-home_items}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - home_items_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-home_items}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./home-items-api
    container_name: home-items-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-home_items}:${POSTGRES_PASSWORD:-home_items_dev_pw}@db:5432/${POSTGRES_DB:-home_items}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - home_items_uploads:/app/uploads

  app:
    build:
      context: ./home-items-app
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: home-items-app
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  home_items_db_data:
  home_items_uploads:
